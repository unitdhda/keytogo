name: Release

on:
  push:
    tags:
      - "v[0-9]*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-14
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14       # native Apple Silicon
          - target: x86_64-apple-darwin
            runner: macos-14       # native Intel
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-release-

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Run tests
        if: matrix.target == 'aarch64-apple-darwin'
        run: cargo test --locked

      - name: Package
        run: |
          ARCHIVE="keytogo-${{ matrix.target }}.tar.gz"
          cp target/${{ matrix.target }}/release/keytogo keytogo
          tar -czf "$ARCHIVE" keytogo
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: keytogo-${{ matrix.target }}
          path: |
            keytogo-${{ matrix.target }}.tar.gz
            keytogo-${{ matrix.target }}.tar.gz.sha256
          retention-days: 1

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Show checksums
        run: cat dist/*.sha256

      - name: Render release notes
        run: |
          {
            echo "## keytogo ${GITHUB_REF_NAME}"
            echo
            echo "### Install"
            echo
            echo "**One-line script:**"
            echo '```sh'
            echo "curl -fsSL https://raw.githubusercontent.com/unitf90/keytogo/main/install.sh | sh"
            echo '```'
            echo
            echo "**Cargo:**"
            echo '```sh'
            echo "cargo install keytogo"
            echo '```'
            echo
            echo "**Homebrew:**"
            echo '```sh'
            echo "brew tap unitf90/tap && brew install keytogo"
            echo '```'
            echo
            echo "**Manual download:** grab the \`.tar.gz\` for your architecture, extract it, then move \`keytogo\` to \`/usr/local/bin/\`."
            echo
            echo "### SHA-256 checksums"
            echo '```'
            cat dist/*.sha256
            echo '```'
          } > RELEASE_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: "keytogo ${{ github.ref_name }}"
          body_path: RELEASE_BODY.md
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
